<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin City Noir Dashboard</title>
    <meta
      name="description"
      content="Sin City noir intelligence dashboard for criminal networks, AI surveillance, and live power shifts."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              noir: "#000000",
              blood: "#ff2a2a",
              bone: "#f5f5f5",
              ash: "#7a7a7a",
              graphite: "#111111",
              steel: "#1d1d1d"
            },
            fontFamily: {
              display: ["Bebas Neue", "sans-serif"],
              body: ["Inter", "sans-serif"]
            },
            boxShadow: {
              ember: "0 0 32px rgba(255, 42, 42, 0.26)",
              panel: "0 24px 80px rgba(0, 0, 0, 0.58)"
            },
            backgroundImage: {
              grid: "linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px)"
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0?dev",
          "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime?dev",
          "react/jsx-dev-runtime": "https://esm.sh/react@18.2.0/jsx-dev-runtime?dev",
          "react-dom": "https://esm.sh/react-dom@18.2.0?dev&external=react",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?dev&external=react",
          "react-router": "https://esm.sh/react-router@6.22.3?dev&external=react",
          "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?dev&external=react,react-dom,react-router",
          "htm": "https://esm.sh/htm@3.1.1",
          "d3": "https://esm.sh/d3@7.9.0"
        }
      }
    </script>
  </head>
  <body class="bg-noir text-bone antialiased">
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;">
        <div style="border:1px solid rgba(255,255,255,0.1);border-radius:24px;background:rgba(0,0,0,0.8);padding:32px 36px;box-shadow:0 24px 80px rgba(0,0,0,0.45);">
          <p style="margin:0;font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:0.14em;text-transform:uppercase;color:#ff2a2a;">Loading</p>
          <p style="margin:8px 0 0;color:rgba(245,245,245,0.55);font-size:13px;letter-spacing:0.18em;text-transform:uppercase;">Booting Sin City dashboard</p>
        </div>
      </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script type="module">
      const root = document.getElementById("root");

      function renderBootError(message) {
        root.innerHTML = `
          <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:left;">
            <div style="max-width:760px;border:1px solid rgba(255,42,42,0.28);border-radius:24px;background:rgba(0,0,0,0.9);padding:28px 32px;box-shadow:0 24px 80px rgba(0,0,0,0.45);">
              <p style="margin:0;font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:0.14em;text-transform:uppercase;color:#ff2a2a;">Frontend Error</p>
              <p style="margin:10px 0 0;color:rgba(245,245,245,0.72);line-height:1.6;">${message}</p>
            </div>
          </div>
        `;
      }

      import("/react/main.js").catch((error) => {
        renderBootError(error?.message || String(error));
      });
    </script>
  </body>
</html>
